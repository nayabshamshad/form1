<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Sign Up</title>
</head>
  <body>
    <form class="form">
      <div class="container">
        <h1>Sign Up</h1>
        <p>Please fill in this form to create an account.</p>
        <div>
        <label for="F-name"><b>Fisrt Name</b></label>
        <input type="text" placeholder="Enter First Name" name="F-name">
    
        <label for="L-name"><b>Last Name</b></label>
        <input type="text" placeholder="Enter Last Name" name="L-name">
      </div>
    
        <label for="email"><b>Email</b></label>
        <input type="text" placeholder="Enter Email" name="email">
    
        <label for="pwd"><b>Password</b></label>
        <input type="password" placeholder="Enter Password" name="pwd">
    
        <label for="pwd-repeat"><b>Repeat Password</b></label>
        <input type="password" placeholder="Repeat Password" name="pwd-repeat">
        
        <label>
          <input class="checkbox" type="checkbox" checked="checked" name="remember" > Remember me
        </label>
        
        <p class="para">By creating an account you agree to our
           <a href="#">Terms & Privacy</a>.
          </p>
        <div>
          <button type="button" class="cancelbtn">Cancel</button>
          <button  type="submit" class="signupbtn"> Sign Up</button>
        </div>
      </div>
    </form>
    </body>
</html>
